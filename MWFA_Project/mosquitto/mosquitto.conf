# MWFA Mosquitto Configuration
# ─────────────────────────────────────────────────────────────

# ── Listeners ─────────────────────────────────────────────────
# MQTT standard (TCP)
listener 1883 0.0.0.0

# MQTT over WebSockets (للـ Dashboard / browser clients)
listener 9001 0.0.0.0
protocol websockets

# ── Authentication ────────────────────────────────────────────
# للتطوير: anonymous مسموح
# للإنتاج: غيّر إلى false وأضف ملف password
allow_anonymous true

# لتفعيل كلمة المرور في الإنتاج:
# allow_anonymous false
# password_file /mosquitto/config/passwd

# ── Persistence ───────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Connection Limits ─────────────────────────────────────────
max_connections 50
max_keepalive 60

# ── Queue Settings ────────────────────────────────────────────
# الحد الأقصى للرسائل في الـ queue لكل subscriber
max_queued_messages 1000
